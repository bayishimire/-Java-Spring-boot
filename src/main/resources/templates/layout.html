<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <title>MediCare+ | Pro Health</title>
</head>
<body th:fragment="main_structure(content)">

    <nav th:fragment="navbar" class="navbar glass">
        <a th:href="@{/}" class="nav-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="18" height="18" rx="4" fill="#2563eb"/>
                <path d="M12 7V17M7 12H17" stroke="white" stroke-width="3" stroke-linecap="round"/>
            </svg>
            MediCare+
        </a>
        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/dashboard}" sec:authorize="isAuthenticated()">Dashboard</a>
            <a href="#">Services</a>
            <a href="#">Doctors</a>
            <a href="#">Contact</a>
        </div>
        <div class="nav-actions d-flex align-items-center gap-3">
             <!-- Show ONLY when NOT authenticated -->
             <a th:href="@{/login}" sec:authorize="isAnonymous()" class="btn-primary">Staff Login</a>
             
             <!-- Show ONLY when AUTHENTICATED -->
             <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-3">
                 <form th:action="@{/logout}" method="post" style="display:inline;">
                     <button type="submit" class="btn btn-sm btn-outline-danger px-3 rounded-pill">Logout</button>
                 </form>
             </div>
        </div>
    </nav>

    <main>
        <div th:replace="${content}"></div>
    </main>

    <footer th:fragment="footer" th:replace="~{footer :: footer}"></footer>

</body>
</html>
