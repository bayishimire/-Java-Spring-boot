<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{dashboard_layout :: dashboard_head}"></head>
<body>
    <div th:replace="~{dashboard_layout :: dashboard_structure(~{:: .pharmacy-unified-view})}">
        <div class="pharmacy-unified-view">
            
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h2 class="fw-900 mb-1">Pharmacy Command Center</h2>
                    <p class="text-muted fw-600">Dispense medicines and manage prescriptions.</p>
                </div>
            </div>

            <div class="card border-0 shadow-lg p-5" style="border-radius: 40px; background: white;">
                <h4 class="fw-900 mb-4">Pending Prescriptions (Incoming "Fish")</h4>

                <div class="table-responsive">
                    <table class="table table-hover align-middle custom-table mb-0">
                        <thead class="bg-light text-muted small text-uppercase">
                            <tr>
                                <th class="px-4 py-3">Patient Name</th>
                                <th class="py-3">Prescription Detail</th>
                                <th class="py-3">Prescribing Doctor</th>
                                <th class="px-4 text-end py-3">Quick Actions</th>
                            </tr>
                        </thead>
                        <tbody class="fw-700">
                             <tr th:each="patient : ${patients}" class="border-transparent">
                                 <td class="px-4">
                                     <div class="d-flex align-items-center gap-3">
                                         <div class="bg-emerald text-white p-2 rounded-circle fw-900 text-center" 
                                              style="width: 35px; height: 35px; background: #10b981;" 
                                              th:text="${#strings.substring(patient.name,0,1)}">P</div>
                                         <span th:text="${patient.name}">Patient Name</span>
                                     </div>
                                 </td>
                                 <td th:text="${patient.prescription}">Medicine Name</td>
                                 <td th:text="|Dr. ${patient.assignedDoctor}|">Doctor Name</td>
                                 <td class="px-4 text-end">
                                     <form th:action="@{/pharmacist/dispense}" method="post">
                                         <input type="hidden" name="id" th:value="${patient.id}">
                                         <button type="submit" class="btn btn-success rounded-pill px-4 btn-sm fw-800 shadow-sm scale-hover">
                                             <i class="bi bi-capsule me-2"></i> Dispense Medication
                                         </button>
                                     </form>
                                 </td>
                             </tr>
                             <tr th:if="${#lists.isEmpty(patients)}">
                                 <td colspan="4" class="text-center py-5 text-muted opacity-50">No pending prescriptions in the pharmacy.</td>
                             </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
