<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{dashboard_layout :: dashboard_head}"></head>
<body>
    <div th:replace="~{dashboard_layout :: dashboard_structure(~{:: .ward-management-view})}">
        <div class="ward-management-view">
            
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h2 class="fw-900 mb-1">Ward & Bed Management</h2>
                    <p class="text-muted fw-600">Configure hospital wards and monitor patient capacity.</p>
                </div>
                <button class="btn btn-primary rounded-pill px-4 py-2 fw-800 shadow-sm" 
                        data-bs-toggle="modal" data-bs-target="#addWardModal">
                    <i class="bi bi-plus-lg me-2"></i> Register New Ward
                </button>
            </div>

            <div class="row g-4">
                <!-- Ward Cards -->
                <div th:each="ward : ${wards}" class="col-md-4">
                    <div class="card border-0 shadow-lg p-4 h-100" style="border-radius: 30px; background: white;">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div class="bg-primary-subtle p-3 rounded-4">
                                <i class="bi bi-hospital text-primary fs-3"></i>
                            </div>
                            <div class="dropdown">
                                <button class="btn btn-link text-muted p-0" data-bs-toggle="dropdown">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm rounded-3">
                                    <li>
                                        <form th:action="@{/admin/wards/delete}" method="post" onsubmit="return confirm('Remove this ward?');">
                                            <input type="hidden" name="id" th:value="${ward.id}">
                                            <button type="submit" class="dropdown-item text-danger fw-600 small">Delete Ward</button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        <h4 class="fw-900 mb-1" th:text="${ward.name}">General Ward</h4>
                        <span class="badge bg-light text-muted fw-700 mb-3" th:text="${ward.type}">General</span>
                        
                        <div class="mt-auto">
                            <div class="d-flex justify-content-between mb-2 small fw-800 text-muted">
                                <span>Total Capacity</span>
                                <span th:text="${ward.capacity + ' Beds'}">20 Beds</span>
                            </div>
                            <div class="progress rounded-pill mb-2" style="height: 10px; background: #f1f5f9;">
                                <div class="progress-bar rounded-pill bg-primary" style="width: 0%"></div>
                            </div>
                            <p class="small text-muted mb-0 fw-600">Click to view admitted patients</p>
                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(wards)}" class="col-12 text-center py-5">
                    <div class="opacity-25 mb-3">
                        <i class="bi bi-house-door fs-1"></i>
                    </div>
                    <h5 class="text-muted fw-700">No wards registered yet.</h5>
                </div>
            </div>

            <!-- ADD WARD MODAL -->
            <div class="modal fade" id="addWardModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content border-0 shadow-lg" style="border-radius: 30px;">
                        <div class="modal-body p-5">
                            <h3 class="fw-900 mb-4 text-center">New Ward Registration</h3>
                            <form th:action="@{/admin/wards/add}" method="post">
                                <div class="mb-3">
                                    <label class="small fw-800 text-muted mb-2 d-block">WARD NAME</label>
                                    <input type="text" name="name" class="form-control border-2 rounded-4 p-3" placeholder="e.g. Ward A - Pediatric" required>
                                </div>
                                <div class="mb-3">
                                    <label class="small fw-800 text-muted mb-2 d-block">BED CAPACITY</label>
                                    <input type="number" name="capacity" class="form-control border-2 rounded-4 p-3" placeholder="e.g. 20" required>
                                </div>
                                <div class="mb-4">
                                    <label class="small fw-800 text-muted mb-2 d-block">WARD TYPE</label>
                                    <select name="type" class="form-select border-2 rounded-4 p-3 fw-700">
                                        <option value="General">General</option>
                                        <option value="Emergency">Emergency</option>
                                        <option value="ICU">Intensive Care (ICU)</option>
                                        <option value="Isolation">Isolation</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-900 shadow-sm">
                                    INITIALIZE WARD <i class="bi bi-check-circle ms-2"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
