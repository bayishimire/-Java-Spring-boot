<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{dashboard_layout :: dashboard_head}"></head>
<body>
    <div th:replace="~{dashboard_layout :: dashboard_structure(~{:: .profile-view})}">
        <div class="profile-view">
            <h2 class="fw-900 mb-2">My Security Profile</h2>
            <p class="text-muted mb-5 fw-600">Authorized Session Management & Identity Controls</p>
            
            <div class="row g-4">
                <!-- User Information Card -->
                <div class="col-lg-4">
                    <div class="stat-card-v2 h-100 p-5 text-center">
                        <!-- Avatar Section with Upload Overlay -->
                        <div class="position-relative mx-auto mb-4" style="width: 140px; height: 140px;">
                            <div class="mx-auto" style="width: 140px; height: 140px; background: #eff6ff; border-radius: 45px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; color: var(--primary-color); border: 4px solid #dbeafe; overflow: hidden;">
                                <i th:if="${user.profilePicture == null}" class="bi bi-person-bounding-box"></i>
                                <img th:if="${user.profilePicture != null}" th:src="@{'/uploads/' + ${user.profilePicture}}" style="width:100%; height:100%; object-fit:cover;">
                            </div>
                            <label for="profile-upload" class="position-absolute bottom-0 end-0 bg-primary text-white rounded-circle p-2 shadow-lg" style="cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 3px solid white;">
                                <i class="bi bi-camera-fill"></i>
                            </label>
                            <form th:action="@{/profile/update-picture}" method="post" enctype="multipart/form-data" id="photo-form">
                                <input type="file" name="picture" id="profile-upload" class="d-none" onchange="document.getElementById('photo-form').submit()">
                            </form>
                        </div>
                        <h3 class="fw-900 mb-1" sec:authentication="name">Staff Member</h3>
                        <div class="badge-role-mini p-2 px-3 fs-6" sec:authentication="principal.authorities">ROLE</div>
                        <hr class="my-4 opacity-50">
                        <div class="text-start">
                             <div class="mb-3">
                                 <small class="text-muted text-uppercase fw-800" style="font-size: 0.65rem;"><i class="bi bi-fingerprint"></i> System Identifier</small>
                                 <p class="fw-700 mb-0">HMS-STF-0012</p>
                             </div>
                             <div class="mb-3">
                                 <small class="text-muted text-uppercase fw-800" style="font-size: 0.65rem;"><i class="bi bi-clock-history"></i> Last Authentication</small>
                                 <p class="fw-700 mb-0">Today at 10:45 AM</p>
                             </div>
                             <div>
                                 <small class="text-muted text-uppercase fw-800" style="font-size: 0.65rem;"><i class="bi bi-shield-lock-fill"></i> Security clearance</small>
                                 <p class="fw-700 mb-0 text-success"><i class="bi bi-shield-check"></i> High (Level 3)</p>
                             </div>
                        </div>
                    </div>
                </div>

                <!-- Security Management -->
                <div class="col-lg-8">
                    <div class="stat-card-v2 p-5 mb-4">
                        <h5 class="fw-900 mb-4"><i class="bi bi-key-fill text-primary me-2"></i> Update Password</h5>
                        
                        <form th:action="@{/profile/update-password}" method="post" class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-800 small text-uppercase">Current Secret</label>
                                <input type="password" name="currentPassword" class="form-control rounded-4 p-3 border-2" placeholder="••••••••" required>
                            </div>
                            <div class="col-md-6"></div>
                            <div class="col-md-6">
                                <label class="form-label fw-800 small text-uppercase">New Password</label>
                                <input type="password" name="newPassword" class="form-control rounded-4 p-3 border-2" placeholder="Create strong password" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-800 small text-uppercase">Confirm New Password</label>
                                <input type="password" name="confirmPassword" class="form-control rounded-4 p-3 border-2" placeholder="Verify password" required>
                            </div>
                            <div class="col-12 mt-4 text-end">
                                <button type="submit" class="btn btn-primary rounded-pill px-5 fw-800 py-3 shadow-sm">Save Encryption Keys</button>
                            </div>
                        </form>
                    </div>

                    <div class="stat-card-v2 p-5" style="background: #fffafa;">
                         <h5 class="fw-900 mb-3 text-danger"><i class="bi bi-exclamation-octagon-fill me-2"></i> Security Log</h5>
                         <p class="text-muted small mb-4">You have connected from 2 authorized devices in the last 24 hours.</p>
                         <button class="btn btn-outline-danger btn-sm rounded-pill px-4 fw-800">Invalidate All Sessions</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
