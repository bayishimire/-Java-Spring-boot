<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{dashboard_layout :: dashboard_head}"></head>
<body>
    <div th:replace="~{dashboard_layout :: dashboard_structure(~{:: .billing-unified-view})}">
        <div class="billing-unified-view">
            
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h2 class="fw-900 mb-1">Billing & Finance Dashboard</h2>
                    <p class="text-muted fw-600">Finalize invoices and process clinical payments.</p>
                </div>
            </div>

            <div class="card border-0 shadow-lg p-5" style="border-radius: 40px; background: white;">
                <h4 class="fw-900 mb-4">Pending Final Invoices (Incoming "Fish")</h4>

                <div class="table-responsive">
                    <table class="table table-hover align-middle custom-table mb-0">
                        <thead class="bg-light text-muted small text-uppercase">
                            <tr>
                                <th class="px-4 py-3">Patient Name</th>
                                <th class="py-3">Current Total</th>
                                <th class="py-3">Payment Status</th>
                                <th class="px-4 text-end py-3">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="fw-700">
                             <tr th:each="patient : ${patients}" class="border-transparent">
                                 <td class="px-4">
                                     <div class="d-flex align-items-center gap-3">
                                         <div class="bg-emerald text-white p-2 rounded-circle fw-900 text-center" 
                                              style="width: 35px; height: 35px; background: #059669;" 
                                              th:text="${#strings.substring(patient.name,0,1)}">B</div>
                                         <span th:text="${patient.name}">Patient Name</span>
                                     </div>
                                 </td>
                                 <td class="fs-5 fw-900 text-dark" th:text="'$' + ${#numbers.formatDecimal(patient.totalCharges, 1, 2)}">$0.00</td>
                                 <td>
                                     <span th:if="${patient.status == 'DISCHARGED'}" class="badge bg-success" style="background: #10b981;">PAID</span>
                                     <span th:unless="${patient.status == 'DISCHARGED'}" class="badge bg-warning" style="background: #f59e0b;">PENDING</span>
                                 </td>
                                 <td class="px-4 text-end">
                                     <form th:if="${patient.status != 'DISCHARGED'}" th:action="@{/billing/finalize}" method="post">
                                         <input type="hidden" name="id" th:value="${patient.id}">
                                         <button type="submit" class="btn btn-primary rounded-pill px-4 btn-sm fw-800 shadow-sm scale-hover">
                                             <i class="bi bi-cash-coin me-2"></i> Confirm Payment & Discharge
                                         </button>
                                     </form>
                                     <button th:if="${patient.status == 'DISCHARGED'}" class="btn btn-outline-success rounded-pill px-4 btn-sm fw-800" disabled>
                                         <i class="bi bi-check-circle me-2"></i> Discharged
                                     </button>
                                 </td>
                             </tr>
                             <tr th:if="${#lists.isEmpty(patients)}">
                                 <td colspan="4" class="text-center py-5 text-muted opacity-50">No pending invoices in billing.</td>
                             </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
